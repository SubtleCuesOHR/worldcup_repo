# Render blueprint. In Render: New + → "Blueprint" → point at this repo.
# This provisions a free Postgres database and injects DATABASE_URL into the
# web service automatically, so picks persist across restarts/redeploys.
# Set the two secret values (API key + entry password) in the dashboard.
databases:
  - name: worldcup-db
    plan: free

services:
  - type: web
    name: worldcup-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-db
          property: connectionString
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: ENTRY_PASS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.4"
